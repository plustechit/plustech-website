<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Plustech Institute</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { background: var(--gray-50); }
    .auth-wrapper {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 5rem 1.5rem 3rem;
    }
    .auth-card {
      background: white; border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl); border: 1px solid var(--gray-200);
      width: 100%; max-width: 500px; overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, var(--blue-900), var(--blue-600));
      padding: 2.5rem 2.5rem 2rem; color: white; text-align: center;
    }
    .auth-logo { font-family:'Sora',sans-serif; font-size:1.8rem; font-weight:800; margin-bottom:0.5rem; }
    .auth-logo span:first-child { color: var(--accent-light); }
    .auth-tagline { font-size: 0.88rem; opacity: 0.8; }
    .auth-body { padding: 2.5rem; }
    .auth-title { font-size: 1.4rem; color: var(--blue-900); margin-bottom: 0.25rem; }
    .auth-sub { font-size: 0.88rem; color: var(--gray-400); margin-bottom: 2rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--gray-600); }
    .auth-footer a { color: var(--blue-500); font-weight: 600; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 3rem; }
    .pwd-toggle { position:absolute; right:0.9rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1rem; color:var(--gray-400); }
    .strength-bar { height:4px; border-radius:2px; background:var(--gray-200); margin-top:0.4rem; overflow:hidden; }
    .strength-fill { height:100%; border-radius:2px; transition:all 0.3s; width:0; }
    .strength-label { font-size:0.75rem; color:var(--gray-400); margin-top:0.25rem; }
    .perks { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.75rem; }
    .perk { display:flex; align-items:center; gap:0.5rem; font-size:0.83rem; color:var(--gray-600); }
    .perk .check { color:var(--success); font-size:0.9rem; }
    @media(max-width:500px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <script src="/js/layout.js"></script>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><span>Plus</span><span style="color:white">tech</span></div>
        <p class="auth-tagline">Start your learning journey today — it's free!</p>
      </div>
      <div class="auth-body">
        <h2 class="auth-title">Create Your Account 🚀</h2>
        <p class="auth-sub">Join 500+ students already learning at Plustech.</p>

        <div class="perks">
          <div class="perk"><span class="check">✓</span> Free to register — no upfront payment</div>
          <div class="perk"><span class="check">✓</span> Browse and enroll in 27+ courses</div>
          <div class="perk"><span class="check">✓</span> Track your learning progress</div>
        </div>

        <div class="alert" id="regAlert"></div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-input" id="regName" placeholder="Your full name"/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" id="regPhone" placeholder="+91 XXXXX XXXXX"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input type="email" class="form-input" id="regEmail" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="regPassword" placeholder="Create a strong password"/>
            <button class="pwd-toggle" onclick="togglePwd('regPassword', this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>

        <button class="btn btn-primary btn-lg" id="regBtn" style="width:100%;justify-content:center;margin-top:0.5rem">
          Create My Account →
        </button>

        <div class="auth-footer">
          Already have an account? <a href="/login">Login here →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard';

    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    // Password strength
    document.getElementById('regPassword').addEventListener('input', function () {
      const val = this.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      const states = [
        { w:'0%', c:'transparent', t:'Enter a password' },
        { w:'25%', c:'#ef4444', t:'Weak' },
        { w:'50%', c:'#f59e0b', t:'Fair' },
        { w:'75%', c:'#3b82f6', t:'Good' },
        { w:'100%', c:'#10b981', t:'Strong ✓' },
      ];
      const s = states[score];
      fill.style.width = s.w; fill.style.background = s.c; label.textContent = s.t;
    });

    document.getElementById('regBtn').addEventListener('click', async () => {
      const btn = document.getElementById('regBtn');
      const alertEl = document.getElementById('regAlert');
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const phone = document.getElementById('regPhone').value.trim();

      if (!name || !email || !password) {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = 'Please fill in all required fields.';
        return;
      }
      if (password.length < 6) {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = 'Password must be at least 6 characters.';
        return;
      }

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await api('/api/auth/register', {
          method: 'POST', body: JSON.stringify({ name, email, password, phone })
        });
        Auth.setSession(res.token, res.user);
        showToast('Welcome to Plustech, ' + res.user.name + '! 🎉', 'success');
        setTimeout(() => window.location.href = '/dashboard', 900);
      } catch (e) {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Create My Account →';
      }
    });
  </script>
</body>
</html>
