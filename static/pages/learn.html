<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn - Plustech Institute</title>
<style>
:root {
  --blue: #1e5aa8; --dark: #0a1628; --amber: #f59e0b;
  --green: #10b981; --red: #ef4444; --grey: #f8f9fa;
  --card: #ffffff; --shadow: 0 2px 12px rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; min-height:100vh; }

/* HEADER */
.header { background: var(--dark); color:white; padding:16px 24px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header a { color:#aaa; text-decoration:none; font-size:14px; }
.header a:hover { color:white; }
.header .course-title { font-size:18px; font-weight:700; color:white; }
.header .badge { background:var(--amber); color:var(--dark); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }

/* LAYOUT */
.layout { display:flex; min-height: calc(100vh - 57px); }

/* SIDEBAR */
.sidebar { width:280px; background:var(--dark); color:white; padding:20px 0; position:sticky; top:57px; height:calc(100vh - 57px); overflow-y:auto; flex-shrink:0; }
.sidebar-section { margin-bottom:8px; }
.sidebar-section-title { padding:10px 20px; font-size:11px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:1px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; transition:0.2s; border-left:3px solid transparent; }
.sidebar-item:hover { background:rgba(255,255,255,0.07); }
.sidebar-item.active { background:rgba(30,90,168,0.3); border-left-color:var(--amber); }
.sidebar-item .type-icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.type-note   .type-icon { background:rgba(59,130,246,0.2); }
.type-code   .type-icon { background:rgba(16,185,129,0.2); }
.type-video  .type-icon { background:rgba(239,68,68,0.2); }
.sidebar-item .item-title { font-size:13px; color:#ccc; line-height:1.3; }
.sidebar-item.active .item-title { color:white; font-weight:600; }

/* MAIN CONTENT */
.main { flex:1; padding:24px; overflow-y:auto; }

/* MATERIAL CARD */
.material-card { background:white; border-radius:12px; box-shadow: var(--shadow); overflow:hidden; }
.material-card-header { padding:20px 24px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:12px; }
.material-card-header .type-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.badge-note  { background:#dbeafe; color:#1d4ed8; }
.badge-code  { background:#d1fae5; color:#065f46; }
.badge-video { background:#fee2e2; color:#991b1b; }
.material-card-header h2 { font-size:20px; color:var(--dark); }
.material-body { padding:24px; }

/* NOTE CONTENT */
.note-content { font-size:15px; line-height:1.8; color:#333; white-space:pre-wrap; font-family:'Segoe UI', Arial, sans-serif; }

/* CODE CONTENT */
.code-wrapper { background:#1e1e1e; border-radius:8px; overflow:hidden; }
.code-header { background:#2d2d2d; padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
.code-lang { color:#aaa; font-size:12px; font-family:monospace; }
.copy-btn { background:var(--blue); color:white; border:none; padding:4px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
.copy-btn:hover { background:#1a4f96; }
.code-content { padding:20px; font-family:'Courier New', monospace; font-size:13.5px; line-height:1.7; color:#d4d4d4; white-space:pre-wrap; overflow-x:auto; }
/* Syntax highlight colors */
.code-content .kw { color:#569cd6; }  /* keywords */
.code-content .str { color:#ce9178; } /* strings */
.code-content .cmt { color:#6a9955; } /* comments */
.code-content .fn { color:#dcdcaa; }  /* functions */
.code-content .num { color:#b5cea8; } /* numbers */

/* VIDEO CONTENT */
.video-container { position:relative; padding-bottom:56.25%; height:0; border-radius:8px; overflow:hidden; }
.video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
.video-link-card { display:flex; align-items:center; gap:16px; padding:20px; border:2px solid #fee2e2; border-radius:10px; background:#fff5f5; cursor:pointer; text-decoration:none; transition:0.2s; }
.video-link-card:hover { border-color:#ef4444; transform:translateY(-2px); }
.video-play-icon { width:56px; height:56px; background:#ef4444; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.video-play-icon svg { fill:white; width:20px; height:20px; margin-left:4px; }
.video-info h3 { font-size:16px; color:var(--dark); margin-bottom:4px; }
.video-info p { font-size:13px; color:#666; }

/* WELCOME SCREEN */
.welcome-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px; text-align:center; }
.welcome-icon { font-size:64px; margin-bottom:16px; }
.welcome-screen h2 { font-size:24px; color:var(--dark); margin-bottom:8px; }
.welcome-screen p { font-size:15px; color:#666; max-width:400px; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:60px 20px; color:#888; }

/* LOADING */
.loading { display:flex; align-items:center; justify-content:center; min-height:300px; }
.spinner { width:40px; height:40px; border:4px solid #e0e0e0; border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ERROR */
.error-box { background:#fee2e2; color:#991b1b; padding:20px; border-radius:10px; text-align:center; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:20px; background:#f0f4f8; padding:4px; border-radius:8px; }
.tab { flex:1; padding:8px; border:none; background:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; color:#666; transition:0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
.tab.active { background:white; color:var(--blue); box-shadow:0 1px 4px rgba(0,0,0,0.1); }

/* NAV BUTTONS */
.nav-buttons { display:flex; gap:10px; margin-top:20px; }
.nav-btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:0.2s; }
.nav-btn.prev { background:#f0f4f8; color:#555; }
.nav-btn.next { background:var(--blue); color:white; }
.nav-btn:hover { opacity:0.85; }
.nav-btn:disabled { opacity:0.4; cursor:not-allowed; }

@media(max-width:768px) {
  .layout { flex-direction:column; }
  .sidebar { width:100%; height:auto; position:static; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/dashboard">← Dashboard</a>
  <span style="color:#444">|</span>
  <span class="course-title" id="courseTitle">Loading...</span>
  <span class="badge" id="categoryBadge"></span>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="loading" style="min-height:200px;"><div class="spinner"></div></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="welcome-screen">
      <div class="welcome-icon">📚</div>
      <h2>Select a topic to start learning</h2>
      <p>Choose any note, code example, or video from the left menu to begin.</p>
    </div>
  </div>
</div>

<script>
let materials = [];
let currentIndex = -1;
const enrollmentId = new URLSearchParams(window.location.search).get('enrollment');

if (!enrollmentId) {
  document.getElementById('mainContent').innerHTML = '<div class="error-box">❌ No enrollment ID provided. <a href="/dashboard">Go back</a></div>';
}

const token = localStorage.getItem('plustech_token');
if (!token) { window.location.href = '/login'; }

async function loadMaterials() {
  try {
    const res = await fetch(`/api/enrollments/${enrollmentId}/materials`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('sidebar').innerHTML = '<div style="padding:20px;color:#f87171;font-size:13px;">❌ ' + (data.error || 'Error loading materials') + '</div>';
      document.getElementById('mainContent').innerHTML = `<div class="error-box">
        <div style="font-size:40px;margin-bottom:12px;">🔒</div>
        <h3 style="margin-bottom:8px;">${data.error || 'Access Denied'}</h3>
        <p>Your enrollment is pending approval. Once the admin gives you access, materials will be available here.</p>
        <a href="/dashboard" style="display:inline-block;margin-top:16px;background:#1e5aa8;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;">← Back to Dashboard</a>
      </div>`;
      return;
    }

    document.getElementById('courseTitle').textContent = data.course_title;
    document.getElementById('categoryBadge').textContent = data.category;
    materials = data.materials;
    renderSidebar();
    if (materials.length > 0) selectMaterial(0);

  } catch(e) {
    document.getElementById('sidebar').innerHTML = '<div style="padding:20px;color:#f87171;">Network error</div>';
  }
}

function renderSidebar() {
  const notes  = materials.filter(m => m.type === 'note');
  const codes  = materials.filter(m => m.type === 'code');
  const videos = materials.filter(m => m.type === 'video');

  let html = '';

  if (notes.length) {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">📄 Notes (${notes.length})</div>`;
    notes.forEach(m => {
      const idx = materials.indexOf(m);
      html += `<div class="sidebar-item type-note" id="item-${idx}" onclick="selectMaterial(${idx})">
        <div class="type-icon">📄</div>
        <div class="item-title">${m.title}</div>
      </div>`;
    });
    html += '</div>';
  }

  if (codes.length) {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">💻 Code Examples (${codes.length})</div>`;
    codes.forEach(m => {
      const idx = materials.indexOf(m);
      html += `<div class="sidebar-item type-code" id="item-${idx}" onclick="selectMaterial(${idx})">
        <div class="type-icon">💻</div>
        <div class="item-title">${m.title}</div>
      </div>`;
    });
    html += '</div>';
  }

  if (videos.length) {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">🎬 Videos (${videos.length})</div>`;
    videos.forEach(m => {
      const idx = materials.indexOf(m);
      html += `<div class="sidebar-item type-video" id="item-${idx}" onclick="selectMaterial(${idx})">
        <div class="type-icon">▶️</div>
        <div class="item-title">${m.title}</div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('sidebar').innerHTML = html || '<div style="padding:20px;color:#666;font-size:13px;">No materials yet.</div>';
}

function selectMaterial(index) {
  // Update sidebar highlight
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('item-' + index);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }

  currentIndex = index;
  const m = materials[index];
  let content = '';

  if (m.type === 'note') {
    content = `
      <div class="material-card">
        <div class="material-card-header">
          <span class="type-badge badge-note">📄 Note</span>
          <h2>${m.title}</h2>
        </div>
        <div class="material-body">
          <div class="note-content">${escHtml(m.content || '')}</div>
        </div>
      </div>`;
  }

  else if (m.type === 'code') {
    const highlighted = highlightCode(m.content || '');
    content = `
      <div class="material-card">
        <div class="material-card-header">
          <span class="type-badge badge-code">💻 Code</span>
          <h2>${m.title}</h2>
        </div>
        <div class="material-body">
          <div class="code-wrapper">
            <div class="code-header">
              <span class="code-lang">Python / Code Example</span>
              <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
            </div>
            <pre class="code-content" id="codeBlock">${highlighted}</pre>
          </div>
        </div>
      </div>`;
  }

  else if (m.type === 'video') {
    const ytId = extractYouTubeId(m.url || '');
    if (ytId) {
      content = `
        <div class="material-card">
          <div class="material-card-header">
            <span class="type-badge badge-video">▶️ Video</span>
            <h2>${m.title}</h2>
          </div>
          <div class="material-body">
            <div class="video-container">
              <iframe src="https://www.youtube.com/embed/${ytId}" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
            </div>
            <p style="margin-top:12px;color:#666;font-size:13px;">
              📺 If the video doesn't load, 
              <a href="${m.url}" target="_blank" style="color:var(--blue);">watch on YouTube</a>
            </p>
          </div>
        </div>`;
    } else {
      content = `
        <div class="material-card">
          <div class="material-card-header">
            <span class="type-badge badge-video">▶️ Video</span>
            <h2>${m.title}</h2>
          </div>
          <div class="material-body">
            <a href="${m.url}" target="_blank" class="video-link-card">
              <div class="video-play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
              <div class="video-info">
                <h3>${m.title}</h3>
                <p>Click to watch on YouTube →</p>
              </div>
            </a>
          </div>
        </div>`;
    }
  }

  // Navigation buttons
  content += `
    <div class="nav-buttons">
      <button class="nav-btn prev" onclick="selectMaterial(${index-1})" ${index===0?'disabled':''}>← Previous</button>
      <button class="nav-btn next" onclick="selectMaterial(${index+1})" ${index===materials.length-1?'disabled':''}>Next →</button>
    </div>`;

  document.getElementById('mainContent').innerHTML = content;
  window.scrollTo({top:0, behavior:'smooth'});
}

function extractYouTubeId(url) {
  const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : null;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightCode(code) {
  let html = escHtml(code);
  // Python keywords
  const keywords = ['def','class','return','if','elif','else','for','while','in','not','and','or','import','from','as','with','try','except','finally','raise','pass','break','continue','True','False','None','self','lambda','print','input','len','range','type','int','str','float','list','dict','set','tuple','super'];
  keywords.forEach(kw => {
    html = html.replace(new RegExp(`\\b${kw}\\b`, 'g'), `<span class="kw">${kw}</span>`);
  });
  // Strings
  html = html.replace(/(&#39;[^&#]*&#39;|&quot;[^&]*&quot;)/g, '<span class="str">$1</span>');
  // Comments
  html = html.replace(/(#[^\n]*)/g, '<span class="cmt">$1</span>');
  return html;
}

function copyCode() {
  const block = document.getElementById('codeBlock');
  if (block) {
    const text = block.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy Code', 2000); }
    });
  }
}

loadMaterials();
</script>
</body>
</html>
